# ============================================================
# BankVision UAT - Nginx Reverse Proxy (Server 1)
# Serves 3 UI panels on separate domains
# ============================================================
#
# --- SSL Certificate Setup (Wildcard: *.mutualtrustbank.com) ---
# Place on this server:
#   mkdir -p /etc/ssl/bankvision
#   cat wildcard.crt ca-chain.crt > /etc/ssl/bankvision/fullchain.crt
#   cp wildcard.key /etc/ssl/bankvision/private.key
#   chmod 644 /etc/ssl/bankvision/fullchain.crt
#   chmod 600 /etc/ssl/bankvision/private.key
# ============================================================

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss;

    # --- Redirect HTTP to HTTPS ---
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- Customer Panel ---
    server {
        listen 443 ssl;
        server_name vdapp-cus.mutualtrustbank.com;

        ssl_certificate     /etc/ssl/bankvision/fullchain.crt;
        ssl_certificate_key /etc/ssl/bankvision/private.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://customer-panel:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- Manager Panel ---
    server {
        listen 443 ssl;
        server_name vdapp-man.mutualtrustbank.com;

        ssl_certificate     /etc/ssl/bankvision/fullchain.crt;
        ssl_certificate_key /etc/ssl/bankvision/private.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://manager-panel:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- Admin Panel ---
    server {
        listen 443 ssl;
        server_name vdapp-admin.mutualtrustbank.com;

        ssl_certificate     /etc/ssl/bankvision/fullchain.crt;
        ssl_certificate_key /etc/ssl/bankvision/private.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://admin-panel:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
